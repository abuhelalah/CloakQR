  sanitizers:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: 6.11.1
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Configure sanitizer build
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_CLOAKQR_APP=OFF
          -DCMAKE_CXX_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer'
          -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'

      - name: Build tests
        run: cmake --build build --parallel --target tst_cryptohelper tst_qrgenerator

      - name: Run tests with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build --output-on-failure

  coverage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build lcov

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: 6.11.1
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Configure coverage build
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_CLOAKQR_APP=OFF
          -DCMAKE_CXX_FLAGS='--coverage'
          -DCMAKE_EXE_LINKER_FLAGS='--coverage'

      - name: Build tests
        run: cmake --build build --parallel --target tst_cryptohelper tst_qrgenerator

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '/opt/Qt/*' --output-file coverage.info
          lcov --summary coverage.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info

  android-apk:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: 6.6.3
          host: linux
          target: android
          arch: android_arm64_v8a

      - name: Configure Android package
        run: >-
          cmake -S . -B build-android -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_CLOAKQR_APP=ON
          -DANDROID_ABI=arm64-v8a

      - name: Build APK
        run: cmake --build build-android --parallel

  ios-app:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: 6.11.1
          host: mac
          target: ios
          arch: ios

      - name: Configure iOS package
        run: >-
          cmake -S . -B build-ios -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_CLOAKQR_APP=ON
          -DCMAKE_TOOLCHAIN_FILE=${{ runner.tool_cache }}/Qt/6.11.1/ios_arm64/lib/cmake/Qt6/Qt6Toolchain.cmake

      - name: Build iOS app
        run: cmake --build build-ios --parallel