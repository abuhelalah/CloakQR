  windows-desktop:
    runs-on: [self-hosted, windows, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Python is available
        shell: cmd
        run: |
          set "PY_EXE="

          for %%P in (
            "%LocalAppData%\Programs\Python\Python312\python.exe"
            "%LocalAppData%\Programs\Python\Python311\python.exe"
            "C:\Python312\python.exe"
            "C:\Python311\python.exe"
          ) do (
            if exist %%~P set "PY_EXE=%%~P"
          )

          if not defined PY_EXE (
            where py >nul 2>nul && for /f "delims=" %%I in ('py -3 -c "import sys; print(sys.executable)"') do set "PY_EXE=%%I"
          )

          if not defined PY_EXE (
            echo Installing Python with Chocolatey...
            choco install -y python
            for %%P in (
              "C:\Python312\python.exe"
              "C:\Python311\python.exe"
            ) do (
              if exist %%~P set "PY_EXE=%%~P"
            )
          )

          if not defined PY_EXE (
            echo Could not locate a usable Python interpreter.
            exit /b 1
          )

          for %%D in ("%PY_EXE%") do set "PY_DIR=%%~dpD"
          echo %PY_DIR%>>"%GITHUB_PATH%"
          "%PY_EXE%" --version
          "%PY_EXE%" -m pip --version

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: 6.8.3
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          setup-python: false

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select CMake generator
        shell: cmd
        run: |
          where ninja >nul 2>nul && (
            echo CMAKE_GENERATOR=Ninja>>"%GITHUB_ENV%"
            echo CMAKE_BUILD_PARALLEL=--parallel>>"%GITHUB_ENV%"
            echo Using Ninja generator
          ) || (
            echo CMAKE_GENERATOR=NMake Makefiles>>"%GITHUB_ENV%"
            echo CMAKE_BUILD_PARALLEL=>>"%GITHUB_ENV%"
            echo Ninja not found, using NMake Makefiles
          )

      - name: Configure
        shell: cmd
        run: cmake -S . -B build -G "%CMAKE_GENERATOR%" -DCMAKE_BUILD_TYPE=Release -DBUILD_CLOAKQR_APP=OFF

      - name: Build
        shell: cmd
        run: cmake --build build %CMAKE_BUILD_PARALLEL% --target cloakqr_cli tst_cryptohelper tst_qrgenerator

      - name: Test
        shell: cmd
        run: ctest --test-dir build --output-on-failure

