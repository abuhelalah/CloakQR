name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux-debug:
    runs-on: ubuntu-latest
    env:
      QT_VERSION: 6.8.3
      BUILD_TYPE: Debug
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtcharts qt5compat qtmultimedia qtsql qttools qttranslations

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBUILD_CLOAKQR_APP=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  linux-release:
    runs-on: ubuntu-latest
    env:
      QT_VERSION: 6.8.3
      BUILD_TYPE: Release
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtcharts qt5compat qtmultimedia qtsql qttools qttranslations

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBUILD_CLOAKQR_APP=ON

      - name: Build
        run: cmake --build build --parallel

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: clang-format --dry-run --Werror $(git ls-files '*.cpp' '*.h')

      - name: Configure for clang-tidy
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_CLOAKQR_APP=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: clang-tidy -p build src/main.cpp

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: linux
          target: desktop
          arch: gcc_64
          modules: qtcharts qt5compat qtmultimedia qtsql qttools qttranslations

      - name: Configure coverage build
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_CLOAKQR_APP=OFF

      - name: Build tests
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtmultimedia qtsql qttools qttranslations

      - name: Configure Android package
        run: cmake -S . -B build-android -DCMAKE_BUILD_TYPE=Release -DBUILD_CLOAKQR_APP=ON -DANDROID_ABI=arm64-v8a

      - name: Build APK
        run: cmake --build build-android --parallel